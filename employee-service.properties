spring.datasource.url=jdbc:mysql://localhost:3306/employee_db
spring.datasource.username=root
spring.datasource.password=1234
server.port=8081
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

departmentservice.base.url=http://DEPARTMENT-SERVICE/api/departments/
organizationservice.base.url=http://ORGANIZATION-SERVICE/api/organizations/


# Circuit Breaker Configuration for Department Service
resilience4j.circuitbreaker.instances.DEPARTMENT-SERVICE.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.DEPARTMENT-SERVICE.failureRateThreshold=50
resilience4j.circuitbreaker.instances.DEPARTMENT-SERVICE.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.DEPARTMENT-SERVICE.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.DEPARTMENT-SERVICE.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.DEPARTMENT-SERVICE.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.DEPARTMENT-SERVICE.slidingWindowSize=10
resilience4j.circuitbreaker.instances.DEPARTMENT-SERVICE.slidingWindowType=COUNT_BASED

# Circuit Breaker Configuration for Organization Service
resilience4j.circuitbreaker.instances.ORGANIZATION-SERVICE.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.ORGANIZATION-SERVICE.failureRateThreshold=50
resilience4j.circuitbreaker.instances.ORGANIZATION-SERVICE.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.ORGANIZATION-SERVICE.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.ORGANIZATION-SERVICE.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.ORGANIZATION-SERVICE.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.ORGANIZATION-SERVICE.slidingWindowSize=10
resilience4j.circuitbreaker.instances.ORGANIZATION-SERVICE.slidingWindowType=COUNT_BASED






